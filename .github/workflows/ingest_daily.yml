name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # 10:00 AM IST is 04:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual runs

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion and Reindexing
        run: |
          python -m ingestion.ingest_daily

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Daily Ingestion: Update processed data and vector index"
          file_pattern: 'data/'
